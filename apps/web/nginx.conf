server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets are immutable -> cache hard. index.html must never be cached so deploys take
    # effect immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: every non-file route returns index.html (React Router handles it client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
