packages:
  - "apps/*"
  - "packages/*"
  - "games/*"

# Native builds we allow (pnpm blocks postinstall build scripts by default):
#   - better-sqlite3: its native binding is required for the SQLite driver to load.
#   - esbuild: bundled via Vite's optionalDependencies; listing it silences the strictDepBuilds warning.
allowBuilds:
  better-sqlite3: true
  esbuild: true

# pnpm 11.8 enforces a default release-age floor (supply-chain guard). Adopt metatron's 1-day floor,
# but exclude our own @metatrongg/sdk: its dev (canary) tag is republished on every metatron develop
# push, so it is always within the cutoff by design -- and we trust our own builds.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@metatrongg/sdk"
