name: ci

on:
    push:
        branches: [main, develop]
    pull_request:

jobs:
    # Always-on, dependency-free checks: compose files parse, shell scripts are sane, and the
    # smart-contracts package stays out of the pnpm workspace.
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: docker compose config parses
              run: |
                  cp deploy/.env.example deploy/.env
                  docker compose -f deploy/docker-compose.yml --env-file deploy/.env config -q
                  docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.observability.yml --env-file deploy/.env config -q
                  docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.anvil.yml --env-file deploy/.env config -q
            - name: shellcheck scripts
              run: |
                  sudo apt-get update && sudo apt-get install -y shellcheck
                  shellcheck scripts/*.sh
            - name: smart-contracts has no package.json (stays out of the workspace)
              run: test ! -f packages/smart-contracts/package.json

    # Typecheck the workspace. @metatrongg/sdk is on public npm, so no special registry config.
    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile=false
            - run: pnpm typecheck
