# game-kit base stack -- everything needed to run on a single VPS. Fits comfortably in ~1.5GB RAM.
#
#   caddy   : TLS + single-origin routing (80/443)
#   web     : static SPA (nginx)
#   api     : Hono server. State is a single SQLite file on the `sqlite_data` volume.
#
# Persistence is SQLite (one file on disk) and the realtime fan-out is in-process, so this is a
# single-machine stack with no external backing services. `--scale api=N` no longer works as-is:
# a single-file SQLite db can't be shared across replicas, and the in-process backplane/tick-lease
# only dedupe within one process. To scale the API tier horizontally, re-enable the swappable
# Redis seams (set REDIS_URL -> Redis backplane + tick lease, see realtime/hub.ts + game/ticker.ts)
# AND move persistence to a shared Postgres -- both were the original design and can be added back.
#
# Usage (from deploy/):  docker compose --env-file .env up -d --build
# Optional overlays:     -f docker-compose.yml -f docker-compose.observability.yml   (Grafana/OTel)
#                        -f docker-compose.yml -f docker-compose.anvil.yml           (local chain)

name: game-kit

services:
    api:
        image: game-kit-api:local
        build:
            context: ..
            dockerfile: apps/api/Dockerfile
            # Lets the build reach a Verdaccio running on the host for @metatron/sdk.
            network: host
            args:
                NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        restart: unless-stopped
        env_file: .env
        environment:
            # Persist the SQLite file on the named volume so it survives container recreation.
            SQLITE_PATH: /data/game-kit.sqlite
        volumes:
            - sqlite_data:/data
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 6
        expose:
            - "8787"

    web:
        image: game-kit-web:local
        build:
            context: ..
            dockerfile: apps/web/Dockerfile
            network: host
            args:
                NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
            interval: 10s
            timeout: 5s
            retries: 6
        expose:
            - "80"

    caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        environment:
            DOMAIN: ${DOMAIN:-localhost}
            ACME_EMAIL: ${ACME_EMAIL:-}
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - api
            - web

volumes:
    sqlite_data:
    caddy_data:
    caddy_config:
