# game-kit base stack -- everything needed to run on a single VPS or any Docker host (the BYOC path).
#
#   caddy    : TLS + single-origin routing (80/443)
#   web      : static SPA (nginx)
#   api      : Hono server, stateless. Persists to Postgres; realtime fan-out + tick lease via Redis.
#   postgres : shared state (the api serializes the realtime engine on row locks here)
#   redis    : WebSocket backplane + tick lease, so the api tier can scale to multiple replicas
#
# Because state lives in Postgres and the realtime seams go through Redis, the api tier is horizontally
# scalable: `docker compose up -d --scale api=N` runs N replicas behind Caddy with no sticky sessions.
#
# Usage (from deploy/):  docker compose --env-file .env up -d --build
# Optional overlays:     -f docker-compose.yml -f docker-compose.observability.yml   (Grafana/OTel)
#                        -f docker-compose.yml -f docker-compose.anvil.yml           (local chain)
#
# On Railway (the managed/automated path) you do NOT use this file: the Railway template provisions
# web + api + Postgres + Redis as managed services and terminates TLS for you (no Caddy). See
# deploy/railway/.

name: game-kit

services:
    api:
        image: game-kit-api:local
        build:
            context: ..
            dockerfile: apps/api/Dockerfile
            # Lets the build reach a Verdaccio running on the host for @metatrongg/sdk.
            network: host
            args:
                NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        restart: unless-stopped
        env_file: .env
        environment:
            # Point the api at the in-network Postgres + Redis. These override anything in .env so the
            # service hostnames are always correct inside the compose network.
            DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/game_kit
            REDIS_URL: redis://redis:6379
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 6
        expose:
            - "8787"

    web:
        image: game-kit-web:local
        build:
            context: ..
            dockerfile: apps/web/Dockerfile
            network: host
            args:
                NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
            interval: 10s
            timeout: 5s
            retries: 6
        expose:
            - "80"

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: game_kit
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d game_kit"]
            interval: 10s
            timeout: 5s
            retries: 6

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 6

    caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        environment:
            DOMAIN: ${DOMAIN:-localhost}
            ACME_EMAIL: ${ACME_EMAIL:-}
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - api
            - web

volumes:
    postgres_data:
    caddy_data:
    caddy_config:
