# Optional overlay: a local Anvil chain for developing/testing the packages/smart-contracts package
# (and for pointing PAYMENT_CHAIN=anvil-local style flows at a throwaway chain). Not for production.
#
#   docker compose -f docker-compose.yml -f docker-compose.anvil.yml up -d anvil
#
# Then deploy the example contract (see packages/smart-contracts/README.md):
#   forge script script/Deploy.s.sol --rpc-url http://localhost:8545 --broadcast \
#     --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

name: game-kit

services:
    anvil:
        image: ghcr.io/foundry-rs/foundry:latest
        restart: unless-stopped
        # 0.0.0.0 so the host (and other containers) can reach the RPC. Deterministic mnemonic so the
        # well-known dev accounts are stable across restarts.
        entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337"]
        ports:
            - "8545:8545"
