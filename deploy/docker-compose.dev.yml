# Local-dev backing services only: Postgres + Redis published on localhost so the api/web run on the
# host via `pnpm dev` (fast HMR) while state lives in containers. The full stack (api/web/caddy in
# containers) is docker-compose.yml. Used by scripts/dev.sh.

name: game-kit-dev

services:
    postgres:
        image: postgres:18-alpine
        environment:
            POSTGRES_USER: gamekit
            POSTGRES_PASSWORD: gamekit
            POSTGRES_DB: gamekit
        ports:
            # Host 5433 (not 5432) so this doesn't clash with another local Postgres (e.g. the TTG
            # stack). apps/api/.env's DATABASE_URL must point at 5433 to match.
            - "5433:5432"
        volumes:
            # Postgres 18+ wants the data volume at /var/lib/postgresql (not /data).
            - pg_dev:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U gamekit -d gamekit"]
            interval: 3s
            timeout: 3s
            retries: 20

    redis:
        image: redis:8-alpine
        ports:
            # Host 6380 (not 6379) to avoid clashing with another local Redis. REDIS_URL matches.
            - "6380:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 3s
            timeout: 3s
            retries: 20

volumes:
    pg_dev:
